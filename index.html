<body>
<div id="initLoader"><div class="loader-ring"></div><p style="color:var(--textm);font-size:12px;letter-spacing:2px">CARREGANDO...</p></div>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-logo">
      <svg width="64" height="64" viewBox="0 0 100 100" fill="none" style="margin-bottom:12px">
        <defs>
          <linearGradient id="vg" x1="0" y1="100" x2="100" y2="0">
            <stop offset="0%" stop-color="#27c47d"/><stop offset="100%" stop-color="#d4a843"/>

    <!-- SIGNUP -->

      <div style="margin-bottom:16px">

      <div style="margin-bottom:20px">
        <label>E-mail</label>
        <input type="email" id="magicEmail" placeholder="voce@email.com" autocomplete="email">
      </div>

    </p>
  </div>

<script src="/assets/js/supabase-client.js"></script>
<script>
function switchAuthTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-form').forEach(f => f.style.display = 'none');
  event?.target?.classList?.add('active');
  if (tab === 'login') { document.querySelector('.auth-tab').classList.add('active'); document.getElementById('loginForm').style.display = 'block'; }
  else if (tab === 'signup') document.getElementById('signupForm').style.display = 'block';
  else if (tab === 'magic') document.getElementById('magicForm').style.display = 'block';
  document.getElementById('alertBox').innerHTML = '';
}

function showAlert(type, msg) {
  document.getElementById('alertBox').innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const senha = document.getElementById('loginSenha').value;
  if (!email || !senha) return showAlert('error', 'Preencha e-mail e senha');
  showAlert('info', '⏳ Entrando...');
  const { data, error } = await window.VitaleAuth.signInWithPassword(email, senha);
  if (error) return showAlert('error', error.message);
  window.location.href = '/app.html';
}

async function doSignup() {
  const email = document.getElementById('signupEmail').value.trim();
  const senha = document.getElementById('signupSenha').value;
  if (!email || senha.length < 8) return showAlert('error', 'E-mail válido e senha de no mínimo 8 caracteres');
  showAlert('info', '⏳ Criando conta...');
  const { data, error } = await window.VitaleAuth.signUpWithPassword(email, senha);
  if (error) return showAlert('error', error.message);
  if (data.user && !data.session) {
    showAlert('success', '✅ Verifique seu e-mail para confirmar a conta!');
  } else {
    window.location.href = '/app.html';
  }
}

async function doMagicLink() {
  const email = document.getElementById('magicEmail').value.trim();
  if (!email) return showAlert('error', 'Informe o e-mail');
  showAlert('info', '⏳ Enviando link...');
  const { error } = await window.VitaleAuth.signInWithMagicLink(email);
  if (error) return showAlert('error', error.message);
  showAlert('success', '✅ Link enviado! Verifique seu e-mail.');
}
// Auto-redirect se já logado (aguarda Supabase processar tokens do URL primeiro)
(async () => {
  if (window.location.hash && window.location.hash.includes('access_token')) {
    await new Promise(resolve => {
      const timeout = setTimeout(resolve, 3000);
      const { data: { subscription } } = window.sb.auth.onAuthStateChange((event) => {
        if (event === 'SIGNED_IN' || event === 'INITIAL_SESSION') {
          clearTimeout(timeout);
          subscription.unsubscribe();
          resolve();
        }
      });
    });
  }
  const user = await window.VitaleAuth.getUser();
  if (user) {
    window.location.href = '/app.html';
    return;
  }
  document.getElementById('initLoader').classList.add('hidden');
  setTimeout(() => document.getElementById('initLoader').remove(), 500);
})();

// Enter para submeter
['loginSenha', 'signupSenha', 'magicEmail'].forEach(id => {
  document.getElementById(id)?.addEventListener('keypress', e => {
    if (e.key === 'Enter') {
      if (id === 'loginSenha') doLogin();
      else if (id === 'signupSenha') doSignup();
      else if (id === 'magicEmail') doMagicLink();
    }
  });
});
</script>
</body>
</html>
